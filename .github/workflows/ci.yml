name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # Both jobs check out the Atom-DSP, Atom-SignalLab, and Atom-Classifier
  # siblings. All are public, so the default GITHUB_TOKEN covers the checkouts and no PAT
  # or gate job is needed (a prior ATOMOS_CLASSIFIER_READ_TOKEN gate silently
  # skipped every run of this workflow from when Atom-Classifier went public
  # until this comment).
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    defaults:
      run:
        working-directory: Atom-Atomizer
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: Atom-Atomizer
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PhysicistJohn/Atom-DSP
          ref: v0.1.0
          path: Atom-DSP
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PhysicistJohn/Atom-SignalLab
          ref: a4e49b5ff3f77ea707a5d33962a4a3a58e46a62b
          path: Atom-SignalLab
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PhysicistJohn/Atom-Classifier
          ref: 2e7f496a43268091f0e1248db5b97bc22753240d
          path: Atom-Classifier
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: |
            Atom-DSP/package-lock.json
            Atom-Atomizer/package-lock.json
            Atom-SignalLab/package-lock.json
      - name: Install exact npm
        run: npm install --global npm@10.9.8
      - name: Verify exact Node and npm versions
        shell: bash
        run: |
          node --version
          npm --version
          test "$(node --version)" = "v22.23.1"
          test "$(npm --version)" = "10.9.8"
      - name: Build Atom-DSP
        working-directory: Atom-DSP
        run: npm ci && npm run build
      - name: Install SignalLab dependencies
        working-directory: Atom-SignalLab
        # NOT --omit=dev: apps/desktop's typecheck compiles SignalLab's .tsx
        # source directly (cross-repo import), which needs @types/react -- a
        # SignalLab devDependency.
        run: npm ci --ignore-scripts
      - name: Install Atomizer
        run: npm ci
      - run: npm run check:launcher
      - name: Build (workspace packages first)
        # apps/desktop imports the other @tinysa/* workspace packages as
        # built output (their package.json "types"/"exports" point at dist/),
        # so typecheck must run after this, not before.
        run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm audit --audit-level=high

  signal-lab-interop:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SIGNAL_LAB_INTEGRATION_REQUIRED: '1'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: Atom-Atomizer
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PhysicistJohn/Atom-DSP
          ref: v0.1.0
          path: Atom-DSP
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PhysicistJohn/Atom-SignalLab
          ref: a4e49b5ff3f77ea707a5d33962a4a3a58e46a62b
          path: Atom-SignalLab
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PhysicistJohn/Atom-Classifier
          ref: 2e7f496a43268091f0e1248db5b97bc22753240d
          path: Atom-Classifier
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: |
            Atom-DSP/package-lock.json
            Atom-Atomizer/package-lock.json
            Atom-SignalLab/package-lock.json
      - name: Install exact npm
        run: npm install --global npm@10.9.8
      - name: Verify exact Node and npm versions
        shell: bash
        run: |
          test "$(node --version)" = "v22.23.1"
          test "$(npm --version)" = "10.9.8"
      - name: Build Atom-DSP
        working-directory: Atom-DSP
        run: npm ci && npm run build
      - name: Install SignalLab
        working-directory: Atom-SignalLab
        run: npm ci
      - name: Verify SignalLab
        working-directory: Atom-SignalLab
        run: npm run check
      - name: Install Atomizer
        working-directory: Atom-Atomizer
        run: npm ci
      - name: Ensure the Electron binary actually landed
        working-directory: Atom-Atomizer
        shell: bash
        # SignalLab's own npm ci (just above) already primed Electron's shared download
        # cache -- Atomizer's npm ci then extracts from that warm cache
        # instead of downloading, which has been silently leaving
        # node_modules/electron/dist empty on this job. Self-heal by forcing
        # electron's own postinstall to run again, with diagnostics if it
        # still doesn't land.
        run: |
          if [ ! -e node_modules/electron/dist/electron ]; then
            echo "Electron binary missing after npm ci; forcing its install script"
            ls -la node_modules/electron/dist 2>&1 || echo "node_modules/electron/dist does not exist"
            node node_modules/electron/install.js
          fi
          test -e node_modules/electron/dist/electron
      - name: Validate the Bayesian detector
        working-directory: Atom-Atomizer
        run: npm run check:bayesian-detector
      - name: Require real in-process SignalLab interoperability
        working-directory: Atom-Atomizer
        run: npm run check
