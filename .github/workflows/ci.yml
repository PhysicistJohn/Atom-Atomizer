name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    defaults:
      run:
        working-directory: TinySA_Atomizer
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: TinySA_Atomizer
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PhysicistJohn/TinySA_SignalLab
          ref: 1442ef2db83d53eea6c5e77924a8d7adc8118942
          path: TinySA_SignalLab
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: |
            TinySA_Atomizer/package-lock.json
            TinySA_SignalLab/package-lock.json
      - name: Install exact npm
        run: npm install --global npm@10.9.8
      - name: Verify exact Node and npm versions
        shell: bash
        run: |
          node --version
          npm --version
          test "$(node --version)" = "v22.23.1"
          test "$(npm --version)" = "10.9.8"
      - name: Install SignalLab runtime dependencies
        working-directory: TinySA_SignalLab
        run: npm ci --omit=dev --ignore-scripts
      - name: Install Atomizer
        run: npm ci
      - run: npm run check:launcher
      - run: npm run check:packaged-resources
      - if: runner.os == 'Windows'
        run: npm run check:observable-training-launcher
      - run: npm run typecheck
      - run: npm run build
      - run: npm run check:package-boundaries
      - run: npm test
      - run: npm audit --audit-level=high

  signal-lab-interop:
    runs-on: ubuntu-latest
    # Cache-independent model regeneration plus calibration and held-out
    # validation deliberately exceeds 90 minutes on a clean runner.
    timeout-minutes: 360
    env:
      SIGNAL_LAB_INTEGRATION_REQUIRED: '1'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: TinySA_Atomizer
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: PhysicistJohn/TinySA_SignalLab
          ref: 1442ef2db83d53eea6c5e77924a8d7adc8118942
          path: TinySA_SignalLab
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: |
            TinySA_Atomizer/package-lock.json
            TinySA_SignalLab/package-lock.json
      - name: Install exact npm
        run: npm install --global npm@10.9.8
      - name: Verify exact Node and npm versions
        shell: bash
        run: |
          test "$(node --version)" = "v22.23.1"
          test "$(npm --version)" = "10.9.8"
      - name: Install SignalLab
        working-directory: TinySA_SignalLab
        run: npm ci
      - name: Verify SignalLab
        working-directory: TinySA_SignalLab
        run: npm run check
      - name: Install Atomizer
        working-directory: TinySA_Atomizer
        run: npm ci
      - name: Ensure the Electron binary actually landed
        working-directory: TinySA_Atomizer
        shell: bash
        # Both repos pin the identical electron@43.1.0, and SignalLab's own
        # npm ci (just above) already primed electron's shared download
        # cache -- Atomizer's npm ci then extracts from that warm cache
        # instead of downloading, which has been silently leaving
        # node_modules/electron/dist empty on this job. Self-heal by forcing
        # electron's own postinstall to run again, with diagnostics if it
        # still doesn't land.
        run: |
          if [ ! -e node_modules/electron/dist/electron ]; then
            echo "Electron binary missing after npm ci; forcing its install script"
            ls -la node_modules/electron/dist 2>&1 || echo "node_modules/electron/dist does not exist"
            node node_modules/electron/install.js
          fi
          test -e node_modules/electron/dist/electron
      - name: Require real SignalLab bridge interoperability
        working-directory: TinySA_Atomizer
        run: npm run check
      - name: Validate the Bayesian detector
        working-directory: TinySA_Atomizer
        run: npm run check:bayesian-detector
      - name: Reproduce the checked-in Bayesian classifier model
        working-directory: TinySA_Atomizer
        run: npm run check:signal-classifier-model
      - name: Validate the Bayesian classifier against pinned SignalLab
        working-directory: TinySA_Atomizer
        run: npm run check:signal-classifier
      - name: Verify classifier publication consistency
        working-directory: TinySA_Atomizer
        run: npm run check:signal-classifier-publication
